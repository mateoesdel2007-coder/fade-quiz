<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f8f68">
    <meta name="description" content="Tests de FADE para estudiar por temas, falladas y examen rápido.">
    <title>FADE Test</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button ghost hidden" id="backButton" type="button" aria-label="Volver">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <p class="eyebrow">FADE</p>
          <h1 id="screenTitle">Test de estudio</h1>
        </div>
        <button class="icon-button ghost" id="themeToggle" type="button" aria-label="Cambiar tema visual">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a7 7 0 1 0 7 7 5.5 5.5 0 0 1-7-7z"/></svg>
        </button>
      </header>

      <main id="app" class="screen" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="Navegación principal">
        <button type="button" data-nav="home" class="active">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z"/></svg>
          Inicio
        </button>
        <button type="button" data-nav="themes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
          Temas
        </button>
        <button type="button" data-nav="failed">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2 21h20z"/><path d="M12 9v5M12 17h.01"/></svg>
          Falladas
        </button>
        <button type="button" data-nav="progress">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5M4 19h16M8 16v-5M13 16V8M18 16v-9"/></svg>
          Progreso
        </button>
      </nav>
    </div>

    <template id="emptyStateTemplate">
      <section class="empty-state">
        <div class="empty-icon"></div>
        <h2></h2>
        <p></p>
      </section>
    </template>

    <script src="data/questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
